<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder Program Closed – NTA SkyNav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #0a0e1a;
      overflow: hidden;
      position: relative;
    }

    /* Grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,160,23,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,160,23,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Radial glow */
    .glow {
      position: absolute;
      width: 700px;
      height: 700px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(212,160,23,0.08) 0%, transparent 70%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 80px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 32px;
      border-radius: 16px;
    }

    .badge {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #22c55e;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 64px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .title span {
      color: #d4a017;
    }

    .subtitle {
      font-family: 'Barlow', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      margin-bottom: 48px;
    }

    .stats {
      display: flex;
      gap: 48px;
      margin-bottom: 56px;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Rajdhani', sans-serif;
      font-size: 56px;
      font-weight: 800;
      color: #d4a017;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,160,23,0.4), transparent);
      margin-bottom: 48px;
    }

    .cta-text {
      font-family: 'Barlow', sans-serif;
      font-size: 22px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      max-width: 700px;
      margin-bottom: 36px;
    }

    .cta-text strong {
      color: #d4a017;
      font-weight: 600;
    }

    .waitlist-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #d4a017;
      color: #0a0e1a;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 16px 40px;
      border-radius: 12px;
      border: none;
      margin-bottom: 40px;
    }

    .url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    .thank-you {
      font-family: 'Barlow', sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="content">
    <img src="nta-logo.png" alt="NTA SkyNav" class="logo">

    <div class="badge">Founder Program Closed</div>

    <div class="title">50 Pilots.<br><span>72 Hours.</span></div>
    <div class="subtitle">Zero ad spend.</div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number">50</div>
        <div class="stat-label">Founders</div>
      </div>
      <div class="stat">
        <div class="stat-number">72h</div>
        <div class="stat-label">Sold out</div>
      </div>
      <div class="stat">
        <div class="stat-number">€0</div>
        <div class="stat-label">Ad spend</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="cta-text">
      Missed out? The waitlist is open.<br>
      <strong>7-day free trial</strong> waiting for you.
    </div>

    <div class="waitlist-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Join the Waitlist
    </div>

    <div class="url">ntaskynav.app</div>
    <div class="thank-you">Thank you. This means everything. 🙏</div>
  </div>
</body>
</html>
