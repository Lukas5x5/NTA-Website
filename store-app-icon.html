<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>App Icon – 512x512</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 20px;
  }
  .icon {
    width: 512px;
    height: 512px;
    background: linear-gradient(145deg, #0A0E1A 0%, #111827 50%, #0d1225 100%);
    border-radius: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Subtle grid pattern */
  .icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,212,240,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,212,240,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  /* Ambient glow */
  .icon::after {
    content: '';
    position: absolute;
    top: -60px;
    left: -60px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,165,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .icon img {
    width: 360px;
    height: 360px;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }
  .hint {
    font-family: sans-serif;
    font-size: 14px;
    color: rgba(200,212,240,0.4);
  }
</style>
</head>
<body>
  <div class="icon">
    <img src="nta-logo.png" alt="NTA SkyNav">
  </div>
  <div class="hint">512 &times; 512px &middot; App Icon &middot; Export as PNG</div>
</body>
</html>
