<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Briefing – NTA SkyNav Social Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #0a0e1a;
      overflow: hidden;
      position: relative;
      font-family: 'Barlow', sans-serif;
    }

    /* Animated starfield */
    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(200, 212, 240, 0.6);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 200, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 255, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Radial glow behind iPad */
    .glow {
      position: absolute;
      width: 1000px;
      height: 1000px;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0, 200, 255, 0.08) 0%, rgba(255, 165, 0, 0.03) 35%, transparent 65%);
      z-index: 0;
    }

    /* Decorative corner accents */
    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      z-index: 1;
    }

    .corner-tl { top: 24px; left: 24px; border-top: 2px solid rgba(0, 200, 255, 0.15); border-left: 2px solid rgba(0, 200, 255, 0.15); }
    .corner-tr { top: 24px; right: 24px; border-top: 2px solid rgba(0, 200, 255, 0.15); border-right: 2px solid rgba(0, 200, 255, 0.15); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 2px solid rgba(0, 200, 255, 0.15); border-left: 2px solid rgba(0, 200, 255, 0.15); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 2px solid rgba(0, 200, 255, 0.15); border-right: 2px solid rgba(0, 200, 255, 0.15); }

    /* ===================== LAYOUT ===================== */
    /* Text overlay top-left, compact */
    .text-overlay {
      position: absolute;
      top: 48px;
      left: 48px;
      z-index: 10;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: calc(100% - 96px);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.2s;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
    }

    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: rgba(200, 212, 240, 0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #00C8FF;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      width: fit-content;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.4s;
    }

    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 6px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.6s;
    }

    .title span { color: #00C8FF; }
    .title .amber { color: #FFA500; }

    .date-line {
      font-family: 'Rajdhani', sans-serif;
      font-size: 19px;
      font-weight: 600;
      color: rgba(200, 212, 240, 0.4);
      letter-spacing: 1px;
      margin-bottom: 10px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.7s;
    }

    .subtitle {
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: rgba(200, 212, 240, 0.5);
      line-height: 1.5;
      margin-bottom: 20px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.8s;
    }

    /* Compact weather pills */
    .weather-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 0.9s;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(17, 24, 39, 0.7);
      border: 1px solid rgba(200, 212, 240, 0.08);
      border-radius: 8px;
      padding: 6px 12px;
    }

    .pill.ok { border-color: rgba(34, 197, 94, 0.2); }
    .pill.warn { border-color: rgba(255, 165, 0, 0.25); }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pill-dot.ok { background: #22c55e; }
    .pill-dot.warn { background: #FFA500; }

    .pill-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: rgba(200, 212, 240, 0.8);
      letter-spacing: 0.5px;
    }

    /* Assessment */
    .assessment {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 165, 0, 0.08);
      border: 1px solid rgba(255, 165, 0, 0.25);
      border-radius: 8px;
      padding: 8px 14px;
      width: fit-content;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 1.1s;
    }

    .assessment-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FFA500;
      animation: pulse 2s ease-in-out infinite;
    }

    .assessment-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #FFA500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(255, 165, 0, 0); }
    }

    /* ===================== iPad CENTER ===================== */
    .ipad-wrapper {
      position: absolute;
      top: 80px;
      left: 45%;
      transform: translateX(-50%);
      z-index: 5;
      animation: fadeSlideUp 1s ease-out both;
      animation-delay: 0.3s;
    }

    .mockup-ipad {
      position: relative;
      width: 520px;
      height: 920px;
      background: #111827;
      border-radius: 32px;
      border: 3.5px solid rgba(200, 212, 240, 0.15);
      box-shadow:
        0 0 0 1px rgba(200, 212, 240, 0.05),
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 120px rgba(0, 200, 255, 0.07);
      overflow: hidden;
      animation: floatDevice 5s ease-in-out infinite;
    }

    @keyframes floatDevice {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .mockup-ipad .screen {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      bottom: 14px;
      border-radius: 20px;
      overflow: hidden;
      background: #0d1117;
    }

    /* Scroll animation for PDF */
    .scroll-container {
      width: 100%;
      animation: scrollPDF 24s ease-in-out infinite;
    }

    .scroll-container img {
      width: 100%;
      display: block;
    }

    @keyframes scrollPDF {
      0%, 40% { transform: translateY(0); }
      60%, 100% { transform: translateY(-33.33%); }
    }

    /* Shine effect */
    .mockup-ipad .shine {
      position: absolute;
      inset: 0;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 35%, transparent 65%, rgba(255,255,255,0.02) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .mockup-ipad .home-indicator {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      border-radius: 2px;
      background: rgba(200, 212, 240, 0.15);
      z-index: 3;
    }

    .mockup-ipad .camera {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(200, 212, 240, 0.08);
      border: 1px solid rgba(200, 212, 240, 0.12);
      z-index: 3;
    }

    /* ===================== BOTTOM BAR ===================== */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: linear-gradient(transparent, rgba(10, 14, 26, 0.95));
      padding-bottom: 6px;
    }

    .url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(200, 212, 240, 0.28);
      letter-spacing: 1px;
      animation: fadeSlideRight 0.8s ease-out both;
      animation-delay: 1.3s;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes fadeSlideRight {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Starfield -->
  <div class="stars" id="stars"></div>

  <!-- Grid -->
  <div class="grid"></div>

  <!-- Glow -->
  <div class="glow"></div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Text overlay (compact, top-left) -->
  <div class="text-overlay">
    <div class="logo-row">
      <img src="nta-logo.png" alt="NTA SkyNav" class="logo">
      <span class="logo-text">NTA SkyNav</span>
    </div>

    <div class="badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
      </svg>
      Weather Briefing
    </div>

    <div class="title">
      Your Flight.<br>
      <span>Your Weather.</span><br>
      <span class="amber">Your Briefing.</span>
    </div>

    <div class="date-line">11 March 2026 · Salzburg, AT · 428 m MSL</div>

    <div class="subtitle">First look at the auto-generated<br>weather briefing sheet.</div>

    <div class="weather-pills">
      <div class="pill ok">
        <div class="pill-dot ok"></div>
        <span class="pill-text">7 km/h N</span>
      </div>
      <div class="pill ok">
        <div class="pill-dot ok"></div>
        <span class="pill-text">42 km Vis</span>
      </div>
      <div class="pill ok">
        <div class="pill-dot ok"></div>
        <span class="pill-text">15.2 °C</span>
      </div>
      <div class="pill warn">
        <div class="pill-dot warn"></div>
        <span class="pill-text">Shear 11</span>
      </div>
    </div>

    <div class="assessment">
      <div class="assessment-dot"></div>
      <span class="assessment-text">Marginal · EASA Cat A</span>
    </div>
  </div>

  <!-- iPad Mockup (large, center-right) -->
  <div class="ipad-wrapper">
    <div class="mockup-ipad">
      <div class="camera"></div>
      <div class="screen">
        <div class="scroll-container">
          <img src="weather-briefing-p1.png" alt="Weather Briefing Page 1">
          <img src="weather-briefing-p2.png" alt="Weather Briefing Page 2">
          <img src="weather-briefing-p3.png" alt="Weather Briefing Page 3">
        </div>
      </div>
      <div class="home-indicator"></div>
      <div class="shine"></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span class="url">ntaskynav.app</span>
  </div>

  <script>
    // Generate random stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = (0.5 + Math.random() * 2) + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = (Math.random() * 3) + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
