<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feature Graphic – 1024x500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 20px;
  }
  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0A0E1A 0%, #111827 40%, #0d1225 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Grid pattern */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,212,240,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,212,240,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .glow-left {
    position: absolute;
    top: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,165,0,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-right {
    position: absolute;
    bottom: -120px; right: -80px;
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(0,200,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Top & bottom amber lines */
  .line-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #FFA500, #ffb732, #FFA500);
    z-index: 10;
  }
  .line-bot {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #FFA500, #ffb732, #FFA500);
    z-index: 10;
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 0 72px;
  }
  .logo img {
    width: 200px;
    height: 200px;
    object-fit: contain;
  }
  .text {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 72px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .brand .accent { color: #FFA500; }
  .tagline {
    font-family: 'Barlow', sans-serif;
    font-size: 24px;
    font-weight: 400;
    color: rgba(200,212,240,0.7);
    letter-spacing: 1px;
  }
  .tags {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .tag {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: rgba(255,165,0,0.12);
    color: #FFA500;
    border: 1px solid rgba(255,165,0,0.25);
  }
  .tag.cyan {
    background: rgba(0,200,255,0.1);
    color: #00C8FF;
    border: 1px solid rgba(0,200,255,0.25);
  }
  .hint {
    font-family: sans-serif;
    font-size: 14px;
    color: rgba(200,212,240,0.4);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="line-top"></div>
    <div class="line-bot"></div>
    <div class="glow-left"></div>
    <div class="glow-right"></div>

    <div class="content">
      <div class="logo">
        <img src="nta-logo.png" alt="NTA SkyNav">
      </div>
      <div class="text">
        <div class="brand">NTA <span class="accent">SkyNav</span></div>
        <div class="tagline">Navigation &amp; Flight Planning for Balloon Pilots</div>
        <div class="tags">
          <span class="tag">ICAO Maps</span>
          <span class="tag">Live Tracking</span>
          <span class="tag cyan">Weather</span>
          <span class="tag cyan">GPS HUD</span>
        </div>
      </div>
    </div>
  </div>
  <div class="hint">1024 &times; 500px &middot; Feature Graphic &middot; Export as PNG</div>
</body>
</html>
